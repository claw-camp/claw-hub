<!DOCTYPE html>
<html>
<head>
  <title>🦞 龙虾营地 - Claw Hub</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
    .header { background: #16213e; padding: 20px; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 24px; display: flex; align-items: center; gap: 10px; }
    .header .subtitle { color: #888; font-size: 14px; margin-top: 5px; }
    .version-badge { font-size: 12px; color: #888; font-weight: normal; margin-left: 8px; }
    .version-badge.has-update { color: #ff9f43; cursor: pointer; }
    .version-badge.has-update:hover { text-decoration: underline; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .last-update { color: #888; font-size: 13px; display: flex; align-items: center; gap: 8px; }
    .ws-status { padding: 4px 10px; border-radius: 20px; font-size: 11px; }
    .ws-status.connected { background: #00ff8820; color: #00ff88; }
    .ws-status.disconnected { background: #ff6b6b20; color: #ff6b6b; }
    
    /* Agent 列表 */
    .agent-card { background: #16213e; border-radius: 12px; margin-bottom: 15px; overflow: hidden; border: 1px solid #0f3460; }
    .agent-header { padding: 20px; cursor: pointer; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto; gap: 15px; align-items: center; }
    .agent-header:hover { background: #1a1a2e; }
    
    .agent-info { display: flex; flex-direction: column; gap: 4px; }
    .agent-name { font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    .agent-meta { font-size: 12px; color: #888; }
    
    .stat-box { text-align: center; }
    .stat-value { font-size: 20px; font-weight: bold; color: #00d9ff; font-family: 'SF Mono', Monaco, monospace; }
    .stat-label { font-size: 11px; color: #888; margin-top: 4px; text-transform: uppercase; }
    
    .expand-icon { font-size: 20px; color: #888; transition: transform 0.3s; }
    .agent-card.expanded .expand-icon { transform: rotate(180deg); }
    
    /* Agent 详情 */
    .agent-details { display: none; background: #1a1a2e; padding: 20px; border-top: 1px solid #0f3460; }
    .agent-card.expanded .agent-details { display: block; }
    
    .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    
    .detail-section { background: #16213e; border-radius: 12px; padding: 20px; }
    .detail-title { font-size: 14px; color: #00d9ff; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
    
    .chart-container { position: relative; height: 200px; }
    
    .plugins-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .plugin-card { background: #1a1a2e; border-radius: 8px; padding: 12px; border: 1px solid #0f3460; }
    .plugin-card:hover { border-color: #00d9ff; }
    .plugin-name { font-weight: 600; color: #eee; font-size: 13px; margin-bottom: 4px; }
    .plugin-version { font-size: 11px; color: #888; }
    .plugin-version span { color: #00ff88; font-weight: 500; }
    
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .status-badge.online { background: #00d9ff20; color: #00d9ff; }
    .status-badge.offline { background: #ff6b6b20; color: #ff6b6b; }
    .status-badge.running { background: #00ff8820; color: #00ff88; }
    .status-badge.stopped { background: #ff6b6b20; color: #ff6b6b; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.online, .status-dot.running { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
    .status-dot.offline, .status-dot.stopped { background: #ff6b6b; }
    
    .empty { text-align: center; padding: 40px; color: #666; }
    
    .update-btn { 
      padding: 4px 12px; 
      border-radius: 12px; 
      border: 1px solid #0f3460; 
      background: #16213e; 
      color: #888; 
      cursor: pointer; 
      font-size: 11px; 
      transition: all 0.2s;
    }
    .update-btn:hover { border-color: #00d9ff; color: #00d9ff; }
    .update-btn.available { border-color: #ff9f43; color: #ff9f43; }
    
    @media (max-width: 768px) {
      .agent-header { grid-template-columns: 1fr; gap: 10px; }
      .details-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>
      🦞 龙虾营地
      <span id="version" class="version-badge"></span>
    </h1>
    <div class="last-update">
      <span class="ws-status disconnected" id="wsStatus">断开</span>
      <span>更新: <span id="lastUpdate">--:--:--</span></span>
    </div>
  </div>
  
  <div class="container">
    <div id="agentsList"></div>
  </div>

  <script>
    let ws = null;
    let agents = [];
    let expandedAgent = null;
    let charts = {};
    let versionInfo = { version: '-', latest: '-', hasUpdate: false };
    let agentUpdateInfo = {};
    
    // 连接 WebSocket
    function connect() {
      const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
      ws = new WebSocket(wsUrl);
      
      ws.onopen = () => {
        document.getElementById('wsStatus').className = 'ws-status connected';
        document.getElementById('wsStatus').textContent = '已连接';
        ws.send(JSON.stringify({ type: 'subscribe' }));
      };
      
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'agents') {
            agents = msg.payload;
            updateAgentsList();
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
          }
        } catch (e) {
          console.error('[WS] 解析失败:', e);
        }
      };
      
      ws.onclose = () => {
        document.getElementById('wsStatus').className = 'ws-status disconnected';
        document.getElementById('wsStatus').textContent = '断开';
        setTimeout(connect, 5000);
      };
    }
    
    // 更新 Agent 列表
    function updateAgentsList() {
      const container = document.getElementById('agentsList');
      
      if (agents.length === 0) {
        container.innerHTML = '<div class="empty">暂无 Agent 数据</div>';
        return;
      }
      
      container.innerHTML = agents.map(agent => {
        const isExpanded = expandedAgent === agent.id;
        return `
          <div class="agent-card ${isExpanded ? 'expanded' : ''}" data-agent-id="${agent.id}">
            <div class="agent-header" onclick="toggleAgent('${agent.id}')">
              <div class="agent-info">
                <div class="agent-name">
                  🦞 ${agent.name || agent.id}
                  ${agentUpdateInfo[agent.id]?.hasUpdate ? `<span class="update-btn available" onclick="event.stopPropagation(); doAgentUpdate('${agent.id}')">🔄 更新</span>` : ''}
                </div>
                <div class="agent-meta">
                  ${agent.host || '--'} 
                  ${agent.agentVersion ? `· Agent v${agent.agentVersion}` : ''}
                  ${agentUpdateInfo[agent.id]?.hasUpdate ? `<span style="color:#ff9f43"> (有更新)</span>` : ''}
                </div>
              </div>
              
              <div class="stat-box">
                <div class="stat-value">${agent.sessions?.count || 0}</div>
                <div class="stat-label">会话</div>
              </div>
              
              <div class="stat-box">
                <div class="stat-value">${formatTokens(agent.stats?.todayTokens)}</div>
                <div class="stat-label">今日Token</div>
              </div>
              
              <div class="stat-box">
                <div class="stat-value">${agent.stats?.cpu?.toFixed(0) || '--'}%</div>
                <div class="stat-label">CPU</div>
              </div>
              
              <div class="stat-box">
                <div class="stat-value">${agent.stats?.memory || '--'}%</div>
                <div class="stat-label">内存</div>
              </div>
              
              <div style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
                <span class="status-badge ${agent.status}">
                  <span class="status-dot ${agent.status}"></span>
                  ${agent.status === 'online' ? '在线' : '离线'}
                </span>
                <span class="expand-icon">▼</span>
              </div>
            </div>
            
            ${isExpanded ? generateAgentDetails(agent) : ''}
          </div>
        `;
      }).join('');
      
      // 如果有展开的 Agent，重新初始化图表
      if (expandedAgent) {
        setTimeout(() => {
          initAgentChart(expandedAgent);
          fetchHistory(expandedAgent);
        }, 50);
      }
    }
    
    // 生成 Agent 详情
    function generateAgentDetails(agent) {
      return `
        <div class="agent-details">
          <div class="details-grid">
            <div class="detail-section">
              <div class="detail-title">📊 Token 消耗（最近6小时）</div>
              <div class="chart-container">
                <canvas id="chart-${agent.id}"></canvas>
              </div>
            </div>
            
            <div class="detail-section">
              <div class="detail-title">🧩 已加载插件 (${agent.plugins?.length || 0}个)</div>
              <div class="plugins-grid">
                ${agent.plugins && agent.plugins.length > 0 
                  ? agent.plugins.map(p => `
                    <div class="plugin-card">
                      <div class="plugin-name">${p.name}</div>
                      <div class="plugin-version">v<span>${p.version}</span></div>
                    </div>
                  `).join('')
                  : '<div style="color:#666;font-size:12px">暂无插件数据</div>'
                }
              </div>
            </div>
          </div>
        </div>
      `;
    }
    
    // 展开/收起 Agent
    function toggleAgent(agentId) {
      if (expandedAgent === agentId) {
        expandedAgent = null;
      } else {
        expandedAgent = agentId;
      }
      updateAgentsList();
    }
    
    // 初始化 Agent 图表
    function initAgentChart(agentId) {
      const canvas = document.getElementById(`chart-${agentId}`);
      if (!canvas) return;
      
      const ctx = canvas.getContext('2d');
      
      // 销毁旧图表
      if (charts[agentId]) {
        charts[agentId].destroy();
      }
      
      charts[agentId] = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: getLast6HourSlots(),
          datasets: [{
            label: 'Token',
            data: new Array(12).fill(0),
            backgroundColor: '#00d9ff',
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: {
              beginAtZero: true,
              ticks: { 
                color: '#888',
                callback: (v) => formatTokens(v)
              },
              grid: { color: '#1a1a2e' }
            },
            x: {
              ticks: { color: '#888' },
              grid: { display: false }
            }
          }
        }
      });
    }
    
    // 获取最近6小时的时间槽
    function getLast6HourSlots() {
      const slots = [];
      const now = new Date();
      const curMinutes = now.getMinutes() < 30 ? 0 : 30;
      const curSlot = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), curMinutes);
      
      for (let i = 11; i >= 0; i--) {
        const slot = new Date(curSlot.getTime() - i * 30 * 60 * 1000);
        const label = slot.getHours().toString().padStart(2, '0') + ':' + slot.getMinutes().toString().padStart(2, '0');
        slots.push(label);
      }
      return slots;
    }
    
    // 从 API 拉取历史数据
    async function fetchHistory(agentId) {
      try {
        const res = await fetch(`/api/history?hours=6&agent=${agentId}`);
        const data = await res.json();
        
        if (charts[agentId] && data.history) {
          const slots = getLast6HourSlots();
          const values = new Array(12).fill(0);
          
          data.history.forEach(h => {
            const idx = slots.indexOf(h.time_slot);
            // API 返回的字段是 'tokens'，不是 'netTokens'
            if (idx >= 0) values[idx] = parseInt(h.tokens) || 0;
          });
          
          charts[agentId].data.datasets[0].data = values;
          charts[agentId].update();
        }
      } catch (e) {
        console.error('[History] 拉取失败:', e);
      }
    }
    
    // 格式化 Token 数量
    function formatTokens(n) {
      if (!n || n === 0) return '0';
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toString();
    }
    
    // 获取版本信息
    async function fetchVersion() {
      try {
        const res = await fetch('/api/version');
        versionInfo = await res.json();
        const el = document.getElementById('version');
        el.textContent = `v${versionInfo.version}`;
        el.className = `version-badge ${versionInfo.hasUpdate ? 'has-update' : ''}`;
        if (versionInfo.hasUpdate) {
          el.title = `点击更新到 v${versionInfo.latest}`;
          el.onclick = doUpdate;
        }
      } catch (e) {
        console.error('[Version] 获取失败:', e);
      }
    }
    
    // 执行 Hub 更新
    async function doUpdate() {
      if (!versionInfo.hasUpdate) return;
      if (!confirm(`确定更新到 v${versionInfo.latest}？\n\n更新后服务将自动重启。`)) return;
      
      const el = document.getElementById('version');
      el.textContent = '更新中...';
      
      try {
        const tokenRes = await fetch('/api/token');
        const tokenData = await tokenRes.json();
        
        if (!tokenData.token) {
          throw new Error('无法获取更新令牌');
        }
        
        const res = await fetch(`/api/update?token=${encodeURIComponent(tokenData.token)}`);
        const result = await res.json();
        
        if (result.success && result.updated) {
          el.textContent = '已更新，等待重启...';
          setTimeout(() => location.reload(), 5000);
        } else if (result.success && !result.updated) {
          el.textContent = 'v' + versionInfo.version + ' (已是最新)';
        } else {
          el.textContent = '更新失败: ' + result.error;
        }
      } catch (e) {
        el.textContent = '更新失败';
        console.error('Update failed:', e);
      }
    }
    
    // 检查 Agent 更新
    async function checkAgentUpdate(agentId) {
      try {
        const res = await fetch(`/api/agent/check-update?agent=${agentId}`);
        const data = await res.json();
        agentUpdateInfo[agentId] = data;
        updateAgentsList();
      } catch (e) {
        console.error('[Agent Update] 检查失败:', e);
      }
    }
    
    // 更新 Agent
    async function doAgentUpdate(agentId) {
      const updateInfo = agentUpdateInfo[agentId];
      if (!updateInfo || !updateInfo.hasUpdate) {
        alert('Agent 已是最新版本');
        return;
      }
      
      if (!confirm(`确定更新 Agent ${agentId} 到 v${updateInfo.latestVersion}？\n\n更新后 Agent 将自动重启。`)) return;
      
      const tokenRes = await fetch('/api/token');
      const tokenData = await tokenRes.json();
      
      if (!tokenData.token) {
        alert('无法获取更新令牌');
        return;
      }
      
      try {
        const res = await fetch(`/api/agent/update?agent=${agentId}&token=${encodeURIComponent(tokenData.token)}`);
        const result = await res.json();
        
        if (result.success) {
          alert('✅ 更新命令已发送，Agent 将在几秒后重启');
        } else {
          alert('❌ 更新失败: ' + result.error);
        }
      } catch (e) {
        alert('❌ 更新失败: ' + e.message);
      }
    }
    
    // 定期检查所有在线 Agent 的更新
    function checkAllAgentUpdates() {
      agents.filter(a => a.status === 'online').forEach(a => {
        checkAgentUpdate(a.id);
      });
    }
    
    // 初始化
    connect();
    fetchVersion();
    setTimeout(checkAllAgentUpdates, 2000);
    setInterval(checkAllAgentUpdates, 300000);
  </script>
</body>
</html>
